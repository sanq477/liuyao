<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六爻秘境 - 64卦互动学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --yang: #ffd700;
            --yin: #4a90d9;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #f0883e;
        }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffd700, #f0883e, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: 1em;
        }
        
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 1px solid #30363d;
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .mode-btn:hover, .mode-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(240, 136, 62, 0.1);
        }
        
        .view { display: none; }
        .view.active { display: block; }
        
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }
        
        .draw-area {
            text-align: center;
            padding: 40px 20px;
        }
        
        .draw-btn {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 20px 0;
        }
        
        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(240, 136, 62, 0.4);
        }
        
        .draw-btn:active { transform: scale(0.98); }
        
        .gua-display {
            margin: 30px 0;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gua-symbol {
            font-size: 72px;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        
        .gua-name {
            font-size: 28px;
            color: var(--yang);
            margin-bottom: 5px;
        }
        
        .gua-nature {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .gua-shi-ying {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 15px;
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            display: inline-block;
        }
        
        .gua-shi-ying .shi { color: #ff6b6b; font-weight: bold; }
        .gua-shi-ying .ying { color: #4ecdc4; font-weight: bold; }
        
        .gua-line.shi-line::after {
            content: '世';
            position: absolute;
            right: -25px;
            font-size: 12px;
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .gua-line.ying-line::after {
            content: '应';
            position: absolute;
            right: -25px;
            font-size: 12px;
            color: #4ecdc4;
            font-weight: bold;
        }
        
        .gua-lines {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }
        
        .gua-line {
            width: 120px;
            height: 12px;
            border-radius: 6px;
            transition: all 0.3s;
            position: relative;
        }
        
        .gua-line.yang {
            background: var(--yang);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .gua-line.yin {
            background: var(--yin);
            position: relative;
        }
        
        .gua-line.yin::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 12px;
            background: var(--bg-card);
            border-radius: 50%;
        }
        
        .gua-meaning {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        
        .gua-meaning h3 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .gua-meaning p {
            color: var(--text-dim);
            line-height: 1.8;
        }
        
        .gua-story {
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid var(--yang);
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 8px 8px 0;
        }
        
        .gua-story-title {
            color: var(--yang);
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .explainer {
            background: rgba(74, 144, 217, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .explainer h3 {
            color: var(--yin);
            margin-bottom: 12px;
        }
        
        .explainer-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .trigram {
            font-size: 32px;
            width: 60px;
            text-align: center;
        }
        
        .trigram-name {
            color: var(--yang);
            width: 80px;
        }
        
        .trigram-meaning {
            color: var(--text-dim);
            font-size: 14px;
        }
        
        .quiz-container {
            text-align: center;
        }
        
        .quiz-gua {
            margin: 30px 0;
        }
        
        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .quiz-option {
            background: var(--bg-card);
            border: 1px solid #30363d;
            color: var(--text);
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        
        .quiz-option:hover {
            border-color: var(--accent);
            background: rgba(240, 136, 62, 0.1);
        }
        
        .quiz-option.correct {
            border-color: #3fb950;
            background: rgba(63, 185, 80, 0.2);
        }
        
        .quiz-option.wrong {
            border-color: #f85149;
            background: rgba(248, 81, 73, 0.2);
        }
        
        .quiz-option.disabled {
            pointer-events: none;
        }
        
        .quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .quiz-feedback.show { display: block; }
        
        .quiz-feedback.correct {
            background: rgba(63, 185, 80, 0.15);
            color: #3fb950;
        }
        
        .quiz-feedback.wrong {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }
        
        .score-display {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-dim);
        }
        
        .score-display span {
            color: var(--yang);
            font-size: 24px;
            font-weight: bold;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--yang));
            transition: width 0.3s;
        }
        
        .hint-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 15px;
        }
        
        .hint-btn:hover {
            border-color: var(--yin);
            color: var(--yin);
        }
        
        .hint-text {
            color: var(--yin);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .hint-text.show { display: block; }
        
        .gua-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        
        .gua-item {
            background: var(--bg-card);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .gua-item:hover {
            border-color: var(--yang);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .gua-item .symbol {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .gua-item .name {
            font-size: 14px;
            color: var(--text);
        }
        
        .gua-item .pinyin {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: var(--text-dim);
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(240, 136, 62, 0.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #30363d;
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .next-btn {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border: none;
        }
        
        .next-btn:hover {
            box-shadow: 0 5px 15px rgba(240, 136, 62, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☰ 六爻秘境 ☷</h1>
            <p class="subtitle">64卦互动学习 · 轻松入门</p>
        </header>
        
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="draw">🎲 抽卦学习</button>
            <button class="mode-btn" data-mode="quiz">🎯 猜卦挑战</button>
            <button class="mode-btn" data-mode="browse">📖 卦象图鉴</button>
            <button class="mode-btn" data-mode="learn">📚 八卦基础</button>
        </div>
        
        <div id="draw-view" class="view active">
            <div class="card">
                <div class="draw-area">
                    <p style="color: var(--text-dim);">点击下方按钮，随机抽取一卦进行学习</p>
                    <button class="draw-btn" onclick="drawGua()">🔮 抽取一卦</button>
                    
                    <div id="gua-display" class="gua-display" style="display: none;">
                        <div class="gua-symbol" id="display-symbol"></div>
                        <div class="gua-name" id="display-name"></div>
                        <div class="gua-nature" id="display-nature"></div>
                        <div class="gua-shi-ying" id="display-shi-ying"></div>
                        
                        <div class="gua-lines" id="display-lines"></div>
                        
                        <div class="gua-meaning">
                            <h3>📖 卦辞解读</h3>
                            <p id="display-meaning"></p>
                            <div class="gua-story" id="display-story"></div>
                        </div>
                        
                        <div class="action-btns">
                            <button class="action-btn next-btn" onclick="drawGua()">下一卦 →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="quiz-view" class="view">
            <div class="card quiz-container">
                <div class="score-display">
                    答对 <span id="score">0</span> / <span id="total">0</span> 题
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="quiz-gua" id="quiz-gua">
                    <div class="gua-lines" id="quiz-lines" style="justify-content: center; margin: 30px 0;"></div>
                </div>
                
                <p style="color: var(--text-dim); margin-bottom: 15px;">这是哪个卦象？</p>
                
                <div class="quiz-options" id="quiz-options"></div>
                
                <div class="quiz-feedback" id="quiz-feedback"></div>
                
                <button class="hint-btn" onclick="showHint()">💡 显示提示</button>
                <div class="hint-text" id="hint-text"></div>
                
                <div class="action-btns" style="margin-top: 25px;">
                    <button class="action-btn next-btn" onclick="nextQuiz()">下一题 →</button>
                </div>
            </div>
        </div>
        
        <div id="browse-view" class="view">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="上经">上经</button>
                <button class="filter-btn" data-filter="下经">下经</button>
            </div>
            <div class="gua-grid" id="gua-grid"></div>
        </div>
        
        <div id="learn-view" class="view">
            <div class="card">
                <div class="explainer">
                    <h3>☰ 什么是八卦？</h3>
                    <p style="color: var(--text-dim); margin-bottom: 15px;">
                        八卦由三条爻组成，分为阳爻（—）和阴爻（--）。八种组合对应八种基本自然现象。
                    </p>
                    <div id="trigram-list"></div>
                </div>
                
                <div class="explainer">
                    <h3>🔄 64卦是怎么来的？</h3>
                    <p style="color: var(--text-dim);">
                        64卦 = 8个上卦 × 8个下卦。每卦由六条爻组成，从下往上数。
                        比如"乾为天"就是乾卦（☰）在上，乾卦（☰）在下。
                    </p>
                </div>
                
                <div class="explainer">
                    <h3>📖 如何读卦？</h3>
                    <p style="color: var(--text-dim);">
                        从下往上读：初九→九二→九三→九四→九五→上九<br>
                        阳爻称"九"，阴爻称"六"<br>
                        例如：初九（第一根是阳爻）、六二（第二根是阴爻）
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="gua-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="gua-symbol" id="modal-symbol" style="text-align: center; font-size: 48px;"></div>
            <div class="gua-name" id="modal-name" style="text-align: center; font-size: 22px; margin: 10px 0;"></div>
            <div class="gua-nature" id="modal-nature" style="text-align: center; margin-bottom: 15px;"></div>
            <div class="gua-shi-ying" id="modal-shi-ying" style="text-align: center; margin-bottom: 15px;"></div>
            <div class="gua-lines" id="modal-lines" style="align-items: center; margin: 15px 0;"></div>
            <div class="gua-meaning">
                <h3>📖 卦辞</h3>
                <p id="modal-meaning"></p>
                <div class="gua-story" id="modal-story"></div>
            </div>
        </div>
    </div>

    <script>
        const trigrams = [
            { symbol: '☰', name: '乾', pinyin: 'qián', meaning: '天', nature: '纯阳' },
            { symbol: '☱', name: '兑', pinyin: 'duì', meaning: '泽', nature: '阴盛' },
            { symbol: '☲', name: '离', pinyin: 'lí', meaning: '火', nature: '阴包阳' },
            { symbol: '☳', name: '震', pinyin: 'zhèn', meaning: '雷', nature: '阳始' },
            { symbol: '☴', name: '巽', pinyin: 'xùn', meaning: '风', nature: '阴始' },
            { symbol: '☵', name: '坎', pinyin: 'kǎn', meaning: '水', nature: '阳包阴' },
            { symbol: '☶', name: '艮', pinyin: 'gèn', meaning: '山', nature: '阴盛' },
            { symbol: '☷', name: '坤', pinyin: 'kūn', meaning: '地', nature: '纯阴' }
        ];
        
        const hexagrams = [
            { index: 1, name: '坤为地', pinyin: 'Kūn wéi Dì', symbol: '䷁', lines: '000000', nature: '上上卦', part: '上经', meaning: '元亨，利牝马之贞。象征地，代表柔顺、承载万物。纯阴至顺，象征地道。', story: '🐎 母马温柔而坚毅，顺从天道，承载万物生长。' , shiYao: 1, yingYao: 3 },
            { index: 2, name: '地雷复', pinyin: 'Dì Léi Fù', symbol: '䷗', lines: '000001', nature: '上上卦', part: '上经', meaning: '亨，出入无疾，朋来无咎。象征复归、复兴。', story: '🔄 雷在地中，阳气回复，冬天过去，春天再来。' , shiYao: 2, yingYao: 4 },
            { index: 3, name: '地水师', pinyin: 'Dì Shuǐ Shī', symbol: '䷆', lines: '000010', nature: '中上卦', part: '上经', meaning: '贞丈人吉，无咎。象征带兵、领导众人。', story: '👑 地下之水汇聚成流，领导人要有德有才。' , shiYao: 3, yingYao: 5 },
            { index: 4, name: '地泽临', pinyin: 'Dì Zé Lín', symbol: '䷒', lines: '000011', nature: '中上卦', part: '下经', meaning: '元亨利贞，至于八月有凶。象征临近、统治。', story: '👀 泽在地上，居高临下，监督治理。' , shiYao: 4, yingYao: 6 },
            { index: 5, name: '地山谦', pinyin: 'Dì Shān Qiān', symbol: '䷎', lines: '000100', nature: '上上卦', part: '上经', meaning: '亨，君子有终。象征谦虚。', story: '⛰️ 山在地之下，愈高而愈谦逊。君子以劳谦有终。' , shiYao: 5, yingYao: 1 },
            { index: 6, name: '地火明夷', pinyin: 'Dì Huǒ Míngyí', symbol: '䷣', lines: '000101', nature: '下下卦', part: '下经', meaning: '利艰贞。象征光明受伤、韬光养晦。', story: '🌙 火在地下，光明被伤，君子于难中守正。' , shiYao: 6, yingYao: 2 },
            { index: 7, name: '地风升', pinyin: 'Dì Fēng Shēng', symbol: '䷭', lines: '000110', nature: '上上卦', part: '下经', meaning: '元亨，用见大人，勿恤，南征吉。象征上升、升高。', story: '🌱 风在地下，阳气上升，生发之象。' , shiYao: 4, yingYao: 6 },
            { index: 8, name: '地天泰', pinyin: 'Dì Tiān Tài', symbol: '䷊', lines: '000111', nature: '上上卦', part: '上经', meaning: '小往大来，吉亨。象征通泰、平安。', story: '🌞 地在上，天在下，阴阳相交，万物通泰。' , shiYao: 3, yingYao: 5 },

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelector(`[data-mode="${viewId.replace('-view', '')}"]`).classList.add('active');
        }
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => showView(btn.dataset.mode + '-view'));
        });
        
        function drawGua() {
            const display = document.getElementById('gua-display');
            display.style.display = 'block';
            display.style.animation = 'none';
            display.offsetHeight;
            display.style.animation = 'fadeIn 0.5s ease';
            
            const gua = hexagrams[Math.floor(Math.random() * hexagrams.length)];
            
            const yaoNames = {1: "初爻", 2: "二爻", 3: "三爻", 4: "四爻", 5: "五爻", 6: "上爻"};
            
            document.getElementById('display-symbol').textContent = gua.symbol;
            document.getElementById('display-name').textContent = gua.name;
            document.getElementById('display-nature').textContent = `${gua.nature} · ${gua.part}`;
            document.getElementById('display-shi-ying').innerHTML = `<span class="shi">世爻：${yaoNames[gua.shiYao]}</span> &nbsp;|&nbsp; <span class="ying">应爻：${yaoNames[gua.yingYao]}</span>`;
            document.getElementById('display-meaning').textContent = gua.meaning;
            document.getElementById('display-story').innerHTML = `<div class="gua-story-title">💡 记忆口诀</div>${gua.story}`;
            
            const linesDiv = document.getElementById('display-lines');
            linesDiv.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const line = document.createElement('div');
                let classes = `gua-line ${gua.lines[i] === '1' ? 'yang' : 'yin'}`;
                const linePos = i + 1;
                if (linePos === gua.shiYao) classes += ' shi-line';
                if (linePos === gua.yingYao) classes += ' ying-line';
                line.className = classes;
                linesDiv.appendChild(line);
            }
        }
        
        function renderTrigrams() {
            const list = document.getElementById('trigram-list');
            list.innerHTML = '';
            trigrams.forEach(t => {
                const item = document.createElement('div');
                item.className = 'explainer-item';
                item.innerHTML = `
                    <div class="trigram">${t.symbol}</div>
                    <div class="trigram-name">${t.name}</div>
                    <div class="trigram-meaning">${t.pinyin} · ${t.meaning}</div>
                `;
                list.appendChild(item);
            });
        }
        
        function renderGuaGrid(filter = 'all') {
            const grid = document.getElementById('gua-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? hexagrams : hexagrams.filter(g => g.part === filter);
            
            filtered.forEach(g => {
                const item = document.createElement('div');
                item.className = 'gua-item';
                item.onclick = () => showGuaDetail(g);
                item.innerHTML = `
                    <div class="symbol">${g.symbol}</div>
                    <div class="name">${g.name}</div>
                    <div class="pinyin">${g.pinyin}</div>
                `;
                grid.appendChild(item);
            });
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGuaGrid(btn.dataset.filter);
            });
        });
        
        function showGuaDetail(gua) {
            const yaoNames = {1: "初爻", 2: "二爻", 3: "三爻", 4: "四爻", 5: "五爻", 6: "上爻"};
            
            document.getElementById('modal-symbol').textContent = gua.symbol;
            document.getElementById('modal-name').textContent = gua.name;
            document.getElementById('modal-nature').textContent = `${gua.nature} · ${gua.part}`;
            document.getElementById('modal-shi-ying').innerHTML = `<span class="shi">世爻：${yaoNames[gua.shiYao]}</span> &nbsp;|&nbsp; <span class="ying">应爻：${yaoNames[gua.yingYao]}</span>`;
            document.getElementById('modal-meaning').textContent = gua.meaning;
            document.getElementById('modal-story').innerHTML = `<div class="gua-story-title">💡 记忆口诀</div>${gua.story}`;
            
            const linesDiv = document.getElementById('modal-lines');
            linesDiv.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const line = document.createElement('div');
                let classes = `gua-line ${gua.lines[i] === '1' ? 'yang' : 'yin'}`;
                const linePos = i + 1;
                if (linePos === gua.shiYao) classes += ' shi-line';
                if (linePos === gua.yingYao) classes += ' ying-line';
                line.className = classes;
                linesDiv.appendChild(line);
            }
            
            document.getElementById('gua-modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('gua-modal').classList.remove('show');
        }
        
        document.getElementById('gua-modal').addEventListener('click', (e) => {
            if (e.target.id === 'gua-modal') closeModal();
        });
        
        function generateQuiz() {
            hintShown = false;
            document.getElementById('hint-text').classList.remove('show');
            
            const correct = hexagrams[Math.floor(Math.random() * hexagrams.length)];
            const options = [correct];
            
            while (options.length < 4) {
                const random = hexagrams[Math.floor(Math.random() * hexagrams.length)];
                if (!options.find(o => o.index === random.index)) {
                    options.push(random);
                }
            }
            
            currentQuiz = { correct, options };
            
            const linesDiv = document.getElementById('quiz-lines');
            linesDiv.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const line = document.createElement('div');
                line.className = `gua-line ${correct.lines[i] === '1' ? 'yang' : 'yin'}`;
                linesDiv.appendChild(line);
            }
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            const shuffled = [...options].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = opt.name;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsDiv.appendChild(btn);
            });
            
            document.getElementById('quiz-feedback').classList.remove('show', 'correct', 'wrong');
        }
        
        function checkAnswer(selected, btn) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(o => o.classList.add('disabled'));
            
            const feedback = document.getElementById('quiz-feedback');
            quizTotal++;
            
            if (selected.index === currentQuiz.correct.index) {
                btn.classList.add('correct');
                feedback.textContent = `✓ 正确！这是「${currentQuiz.correct.name}」`;
                feedback.classList.add('show', 'correct');
                quizScore++;
            } else {
                btn.classList.add('wrong');
                options.forEach(o => {
                    if (o.textContent === currentQuiz.correct.name) {
                        o.classList.add('correct');
                    }
                });
                feedback.textContent = `✗ 不对，这是「${currentQuiz.correct.name}」`;
                feedback.classList.add('show', 'wrong');
            }
            
            document.getElementById('score').textContent = quizScore;
            document.getElementById('total').textContent = quizTotal;
            document.getElementById('progress').style.width = `${(quizScore / quizTotal) * 100}%`;
        }
        
        function showHint() {
            if (hintShown) return;
            hintShown = true;
            
            const yaoNames = {1: "初爻", 2: "二爻", 3: "三爻", 4: "四爻", 5: "五爻", 6: "上爻"};
            const gua = currentQuiz.correct;
            const hintText = document.getElementById('hint-text');
            hintText.innerHTML = `💡 提示：${gua.nature} | 世爻：${yaoNames[gua.shiYao]}，应爻：${yaoNames[gua.yingYao]}<br>${gua.story}`;
            hintText.classList.add('show');
        }
        
        function nextQuiz() {
            generateQuiz();
        }
        
        renderTrigrams();
        renderGuaGrid();
        generateQuiz();
    </script>
</body>
</html>
